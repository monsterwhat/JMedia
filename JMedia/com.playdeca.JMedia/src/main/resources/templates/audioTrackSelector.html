<!-- Audio Track Selector Component -->
<div class="audio-track-selector" id="audioTrackSelector">
    <div class="audio-track-button" onclick="window.toggleAudioTrackMenu()" title="Audio Language">
        <i class="pi pi-volume-up"></i>
        <span class="current-track" id="currentAudioTrackDisplay">Default</span>
    </div>
    
    <div class="audio-track-menu" id="audioTrackMenu" style="display: none;">
        <div class="track-list-header">Audio Tracks</div>
        <div class="track-list" id="audioTrackList">
            <div class="track-item" data-track="default" onclick="window.selectAudioTrack('default')">
                <span class="track-name">Default</span>
                <i class="pi pi-check track-selected" style="display: none;"></i>
            </div>
        </div>
    </div>
</div>

<script>
let currentAudioTrackId = 'default';
let availableAudioTracks = [];

// Initialize audio track selector
window.initializeAudioTrackSelector = function() {
    if (window.player) {
        window.loadAvailableAudioTracks();
        window.updateCurrentAudioTrackDisplay();
        
        // Restore saved track preference
        const videoId = window.currentVideoId || (window.player ? window.player.videoId : null);
        if (videoId) {
            const savedTrack = localStorage.getItem('jmedia_audio_track_' + videoId);
            if (savedTrack && window.player && window.player.switchAudioTrack) {
                setTimeout(() => {
                    window.player.switchAudioTrack(parseInt(savedTrack));
                    console.log('[AudioSelector] Restored track preference:', savedTrack);
                }, 1000);
            }
        }
    }
};

// Load available audio tracks
window.loadAvailableAudioTracks = async function() {
    try {
        const videoId = window.currentVideoId || (window.player ? window.player.videoId : null) || {item.id};
        if (!videoId) return;
        
        // First try to get tracks from the player instance (HLS/Native)
        if (window.player && window.player.getAudioTracks) {
            const playerTracks = window.player.getAudioTracks();
            if (playerTracks && playerTracks.length > 0) {
                console.log('[AudioSelector] Using player-detected tracks:', playerTracks);
                availableAudioTracks = playerTracks;
                window.populateAudioTrackMenu();
                return;
            }
        }
        
        // Fallback to database-known tracks via API
        const response = await fetch('/api/video/' + videoId + '/audio-tracks');
        if (response.ok) {
            const data = await response.json();
            const payload = data.data || data;
            availableAudioTracks = payload || [];
            window.populateAudioTrackMenu();
        }
    } catch (error) {
        console.error('Error loading audio tracks:', error);
    }
};

// Populate the track menu with available tracks
window.populateAudioTrackMenu = function() {
    const trackList = document.getElementById('audioTrackList');
    if (!trackList) return;
    
    // Clear existing tracks (keep "Default" option)
    while (trackList.children.length > 1) {
        trackList.removeChild(trackList.lastChild);
    }
    
    // Add available tracks
    availableAudioTracks.forEach(track => {
        const trackItem = document.createElement('div');
        trackItem.className = 'track-item';
        trackItem.dataset.track = track.id;
        
        let label = track.displayName || track.languageName || track.languageCode || 'Unknown';
        if (track.channels) {
            const channelLabel = track.channels === 6 ? ' 5.1' : track.channels === 8 ? ' 7.1' : track.channels === 2 ? ' Stereo' : '';
            label += channelLabel;
        }
        if (track.title && track.title !== label) {
            label += ' (' + track.title + ')';
        }
        
        trackItem.innerHTML = '<span class="track-name">' + label + '</span>' +
            '<i class="pi pi-check track-selected" style="display: none;"></i>';
        trackItem.onclick = () => window.selectAudioTrack(track.id);
        trackList.appendChild(trackItem);
    });
    
    // Update selection indicators
    window.updateAudioTrackSelection();
    window.updateCurrentAudioTrackDisplay();
};

// Toggle audio track menu visibility
window.toggleAudioTrackMenu = function() {
    const menu = document.getElementById('audioTrackMenu');
    if (!menu) return;
    
    const isVisible = menu.style.display !== 'none';
    
    // Hide all other menus
    document.querySelectorAll('.audio-track-menu, .subtitle-menu, .speed-menu').forEach(m => {
        if (m !== menu) m.style.display = 'none';
    });
    
    menu.style.display = isVisible ? 'none' : 'block';
    
    if (!isVisible) {
        window.loadAvailableAudioTracks(); // Refresh tracks when opening
    }
};

// Select an audio track
        window.selectAudioTrack = function(trackId) {
            console.log('[AudioSelector] Selecting track:', trackId);

            // Handle "default" track - use setAudioTrack which sends -1 to backend
            if (trackId === 'default') {
                if (window.player && window.player.setAudioTrack) {
                    window.player.setAudioTrack('default');
                }
                // Still update UI and save preference
                currentAudioTrackId = 'default';
                window.updateAudioTrackSelection();
                window.updateCurrentAudioTrackDisplay();
                window.saveAudioTrackPreference(trackId);

                // Persist to localStorage for cross-episode memory
                const videoId = window.currentVideoId || (window.player ? window.player.videoId : null);
                if (videoId) {
                    localStorage.setItem('jmedia_audio_track_' + videoId, trackId);
                    console.log('[AudioSelector] Saved track preference for video', videoId, ':', trackId);
                }

                const menu = document.getElementById('audioTrackMenu');
                if (menu) menu.style.display = 'none';
                return;
            }

            // Convert trackId to numeric index for simple-player
            let trackIndex = parseInt(trackId);
            if (isNaN(trackIndex)) {
                // If trackId is not a number, try to find the track index
                const track = availableAudioTracks.find(t => t.id == trackId);
                trackIndex = track ? (track.trackIndex ?? track.id ?? 0) : 0;
            }

            // Use simple-player's switchAudioTrack (restarts stream with new audio track)
            if (window.player && window.player.switchAudioTrack) {
                window.player.switchAudioTrack(trackIndex);
            }

            // Update UI and save preference
            currentAudioTrackId = trackId;
            window.updateAudioTrackSelection();
            window.updateCurrentAudioTrackDisplay();
            window.saveAudioTrackPreference(trackId);

            // Persist to localStorage for cross-episode memory
            const videoId = window.currentVideoId || (window.player ? window.player.videoId : null);
            if (videoId) {
                localStorage.setItem('jmedia_audio_track_' + videoId, trackId);
                console.log('[AudioSelector] Saved track preference for video', videoId, ':', trackId);
            }

            const menu = document.getElementById('audioTrackMenu');
            if (menu) menu.style.display = 'none';
        };

// Update track selection indicators
window.updateAudioTrackSelection = function() {
    document.querySelectorAll('#audioTrackList .track-item').forEach(item => {
        const trackId = item.dataset.track;
        const checkIcon = item.querySelector('.track-selected');
        
        if (trackId === currentAudioTrackId.toString()) {
            if (checkIcon) checkIcon.style.display = 'inline';
            item.classList.add('selected');
        } else {
            if (checkIcon) checkIcon.style.display = 'none';
            item.classList.remove('selected');
        }
    });
};

// Update current track display
window.updateCurrentAudioTrackDisplay = function() {
    const display = document.getElementById('currentAudioTrackDisplay');
    if (!display) return;
    
    if (currentAudioTrackId === 'default') {
        display.textContent = 'Default';
    } else {
        const track = availableAudioTracks.find(t => t.id == currentAudioTrackId);
        if (track) {
            display.textContent = track.languageName || track.displayName || track.languageCode || 'Audio';
        } else {
            display.textContent = 'Track ' + currentAudioTrackId;
        }
    }
};

// Save track preference
window.saveAudioTrackPreference = async function(trackId) {
    try {
        const videoId = window.currentVideoId || (window.player ? window.player.videoId : null) || {item.id};
        if (!videoId) return;
        
        const trackInfo = availableAudioTracks.find(t => t.id == trackId);
        
        const url = '/api/video/playback/audio-preference?videoId=' + videoId + 
                    '&trackId=' + (trackId !== 'default' ? trackId : '') + 
                    '&language=' + (trackInfo ? encodeURIComponent(trackInfo.languageCode || '') : '');
        
        await fetch(url, { method: 'POST' });
    } catch (error) {
        console.error('Error saving audio track preference:', error);
    }
};

// Close menu when clicking outside
document.addEventListener('click', function(e) {
    const selector = document.getElementById('audioTrackSelector');
    const menu = document.getElementById('audioTrackMenu');
    if (selector && menu && !selector.contains(e.target) && menu.style.display !== 'none') {
        menu.style.display = 'none';
    }
});

// Initialize
setTimeout(window.initializeAudioTrackSelector, 1000);
</script>

<style>

    display: inline-block;
    z-index: 100;
    margin-right: 10px;

    transition: all 0.2s;
    height: 36px;
}

}

}

    position: absolute;

    border: 1px solid #333;
    border-radius: 6px;

    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    z-index: 1001;
}

    padding: 10px 15px;
    font-size: 0.75rem;
    font-weight: bold;
    color: #888;
    text-transform: uppercase;

}

.audio-track-menu .track-list {
    max-height: 250px;

.audio-track-menu .track-item {

</style>
