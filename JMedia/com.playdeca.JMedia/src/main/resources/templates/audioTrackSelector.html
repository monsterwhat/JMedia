<!-- Audio Track Selector Component -->
<div class="audio-track-selector" id="audioTrackSelector">
    <div class="audio-track-button" onclick="window.toggleAudioTrackMenu()" title="Audio Language">
        <i class="pi pi-volume-up"></i>
        <span class="current-track" id="currentAudioTrackDisplay">Default</span>
    </div>
    
    <div class="audio-track-menu" id="audioTrackMenu" style="display: none;">
        <div class="track-list-header">Audio Tracks</div>
        <div class="track-list" id="audioTrackList">
            <div class="track-item" data-track="default" onclick="window.selectAudioTrack('default')">
                <span class="track-name">Default</span>
                <i class="pi pi-check track-selected" style="display: none;"></i>
            </div>
        </div>
    </div>
</div>



<style>
.audio-track-selector {
    position: relative;
    display: inline-block;
    z-index: 100;
    margin-right: 10px;
}

.audio-track-button {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    color: white;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
    height: 36px;
}

.audio-track-button:hover {
    background: rgba(255, 255, 255, 0.2);
}

.audio-track-button .current-track {
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.audio-track-menu {
    position: absolute;
    bottom: 100%;
    right: 0;
    margin-bottom: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    min-width: 180px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    z-index: 1001;
}

.audio-track-menu .track-list-header {
    padding: 10px 15px;
    font-size: 0.75rem;
    font-weight: bold;
    color: #888;
    text-transform: uppercase;
    border-bottom: 1px solid #333;
}

.audio-track-menu .track-list {
    max-height: 250px;
    overflow-y: auto;
}

.audio-track-menu .track-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 15px;
    cursor: pointer;
    color: #eee;
    font-size: 0.9rem;
}

.audio-track-menu .track-item:hover {
    background: #333;
}

.audio-track-menu .track-item.selected {
    color: #48c774;
}

.audio-track-menu .track-selected {
    font-size: 0.8rem;
}
</style>
