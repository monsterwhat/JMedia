<!-- Subtitle Settings Component -->
<div class="subtitle-settings-overlay" id="subtitleSettingsOverlay" style="display: none;">
    <div class="subtitle-settings-panel">
        <div class="subtitle-settings-header">
            <h3>Subtitle Settings</h3>
            <button class="close-btn" onclick="window.toggleSubtitleSettings()">
                <i class="pi pi-times"></i>
            </button>
        </div>
        
        <!-- Track Selection -->
        <div class="setting-group">
            <label for="subtitleTrack">Subtitle Track</label>
            <select id="subtitleTrack" onchange="changeSubtitleTrack(this.value)">
                <option value="off">Off</option>
            </select>
        </div>
        
        <!-- Subtitle Correction -->
        <div class="setting-group">
            <label>Timing Correction (Offset)</label>
            <div class="correction-controls">
                <button class="btn-small" onclick="adjustSubtitleCorrection(-0.5)">-0.5s</button>
                <div class="correction-display" id="subtitleCorrectionVal">0.0s</div>
                <button class="btn-small" onclick="adjustSubtitleCorrection(0.5)">+0.5s</button>
                <button class="btn-small btn-outline" onclick="resetSubtitleCorrection()">Reset</button>
            </div>
            <p class="help-text">Use this if subtitles are out of sync with audio.</p>
        </div>

        <div class="divider"></div>

        <!-- Font Size -->
        <div class="setting-group">
            <label for="subtitleSize">Font Size</label>
            <div class="slider-container">
                <input type="range" id="subtitleSize" min="12" max="48" value="20" 
                       oninput="updatePreviewStyle()">
                <span id="subtitleSizeValue">20px</span>
            </div>
        </div>
        
        <!-- Font Color -->
        <div class="setting-group">
            <label for="subtitleColor">Text Color</label>
            <div class="color-picker-container">
                <input type="color" id="subtitleColor" value="#ffffff" 
                       oninput="updatePreviewStyle()">
                <button class="preset-color" style="background:#ffffff" onclick="setSubtitleColor('#ffffff')"></button>
                <button class="preset-color" style="background:#ffff00" onclick="setSubtitleColor('#ffff00')"></button>
                <button class="preset-color" style="background:#00ff00" onclick="setSubtitleColor('#00ff00')"></button>
            </div>
        </div>
        
        <!-- Background Opacity -->
        <div class="setting-group">
            <label for="subtitleBgOpacity">Background Opacity</label>
            <div class="slider-container">
                <input type="range" id="subtitleBgOpacity" min="0" max="1" step="0.1" value="0.7" 
                       oninput="updatePreviewStyle()">
                <span id="subtitleBgOpacityValue">0.7</span>
            </div>
        </div>

        <!-- Distance from Bottom -->
        <div class="setting-group">
            <label for="subtitleBottom">Bottom Distance</label>
            <div class="slider-container">
                <input type="range" id="subtitleBottom" min="20" max="200" step="5" value="60" 
                       oninput="updatePreviewStyle()">
                <span id="subtitleBottomValue">60px</span>
            </div>
        </div>
        
        <!-- Preview -->
        <div class="subtitle-preview-box">
            <div id="subSettingsPreviewText">Sample Subtitle Text</div>
        </div>
        
        <!-- Action Buttons -->
        <div class="setting-actions">
            <button class="btn-secondary" onclick="resetSubtitleStyles()">Reset Styles</button>
            <button class="btn-primary" onclick="window.saveSubtitleSettings()">Save & Close</button>
        </div>
    </div>
</div>



<style>
.subtitle-settings-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center;
    z-index: 10000; backdrop-filter: blur(10px);
}
.subtitle-settings-panel {
    background: rgba(20, 20, 20, 0.95); border-radius: 12px; padding: 24px;
    width: 90%; max-width: 420px; color: white; border: 1px solid rgba(255, 255, 255, 0.1);
    max-height: 90vh; overflow-y: auto;
}
.subtitle-settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.divider { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
.setting-group { margin-bottom: 16px; }
.setting-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
.setting-group select { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; }
.correction-controls { display: flex; align-items: center; gap: 10px; }
.correction-display { flex: 1; text-align: center; font-weight: bold; font-family: monospace; font-size: 1.2rem; background: #000; padding: 5px; border-radius: 4px; }
.btn-small { padding: 5px 10px; background: #444; border: none; color: white; border-radius: 4px; cursor: pointer; }
.btn-small:hover { background: #555; }
.btn-outline { background: transparent; border: 1px solid #555; }
.help-text { font-size: 0.75rem; color: #777; margin-top: 5px; }
.slider-container { display: flex; align-items: center; gap: 10px; }
.slider-container input { flex: 1; }
.slider-container span { min-width: 45px; font-size: 0.8rem; }
.color-picker-container { display: flex; gap: 8px; align-items: center; }
.preset-color { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #666; cursor: pointer; }
.subtitle-preview-box { 
    margin: 20px 0; padding: 30px 10px; background: #111; border-radius: 8px; 
    display: flex; justify-content: center; align-items: center; border: 1px dashed #333;
}
#subSettingsPreviewText { padding: 4px 12px; border-radius: 4px; text-align: center; }
.setting-actions { display: flex; gap: 12px; margin-top: 20px; }
.btn-primary { flex: 1; background: #48c774; color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
.btn-secondary { flex: 1; background: #333; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
</style>
