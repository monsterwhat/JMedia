<form hx-post="/api/video/manage/update/{video.id}" hx-swap="none" class="p-2" id="editMetadataForm">
    <!-- File Location Info Section -->
    <div class="field mb-5" style="padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border);">
        <label class="label is-size-7" style="color: var(--standard-accent); margin-bottom: 4px; text-transform: uppercase;">File Information</label>
        <p class="is-size-7 mb-1"><strong class="has-text-grey">Filename:</strong> <span>{video.filename}</span></p>
        <p class="is-size-7" style="word-break: break-all;"><strong class="has-text-grey">Path:</strong> <span>{video.path}</span></p>
    </div>

    <div class="field">
        <label class="label">Primary Title</label>
        <div class="control">
            <input class="input" type="text" name="title" value="{video.title ?: ''}" 
                   placeholder="Enter main title">
        </div>
    </div>

    <div class="field">
        <label class="label">Media Type</label>
        <div class="control">
            <div class="select is-fullwidth">
                <select name="type" id="typeSelector">
                    <option value="movie" {#if video.type == 'movie'}selected{/if}>Movie</option>
                    <option value="episode" {#if video.type == 'episode'}selected{/if}>TV Episode</option>
                    <option value="short" {#if video.type == 'short'}selected{/if}>Short</option>
                    <option value="documentary" {#if video.type == 'documentary'}selected{/if}>Documentary</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Series Selection Section (Combobox Style) -->
    <div class="field series-only-field" {#if video.type != 'episode'}style="display:none"{/if}>
        <label class="label">Series / Show Name</label>
        <div class="control has-icons-right">
            <input class="input" type="text" name="seriesTitle" id="seriesTitleInput" 
                   value="{video.seriesTitle ?: ''}" 
                   placeholder="Select or type new series name..."
                   list="seriesList">
            <span class="icon is-right">
                <i class="pi pi-chevron-down"></i>
            </span>
            <datalist id="seriesList">
                {#for series in allSeries}
                <option value="{series}"></option>
                {/for}
            </datalist>
        </div>
        <p class="help has-text-grey">Select an existing show or type a new one to re-parent this episode.</p>
    </div>

    <div class="columns series-only-field" {#if video.type != 'episode'}style="display:none"{/if}>
        <div class="column">
            <div class="field">
                <label class="label">Episode Title</label>
                <div class="control">
                    <input class="input" type="text" name="episodeTitle" value="{video.episodeTitle ?: ''}">
                </div>
            </div>
        </div>
    </div>

    <div class="columns series-only-field" {#if video.type != 'episode'}style="display:none"{/if}>
        <div class="column is-6">
            <div class="field">
                <label class="label">Season Number</label>
                <div class="control">
                    <input class="input" type="number" name="seasonNumber" value="{video.seasonNumber ?: 0}">
                </div>
            </div>
        </div>
        <div class="column is-6">
            <div class="field">
                <label class="label">Episode Number</label>
                <div class="control">
                    <input class="input" type="number" name="episodeNumber" value="{video.episodeNumber ?: 0}">
                </div>
            </div>
        </div>
    </div>

    <div class="columns">
        <div class="column">
            <div class="field">
                <label class="label">IMDb ID</label>
                <div class="control">
                    <input class="input" type="text" name="imdbId" value="{video.imdbId ?: ''}" placeholder="e.g. tt0111161">
                </div>
                <p class="help has-text-grey">The IMDb ID of this video/movie</p>
            </div>
        </div>
        <div class="column">
            <div class="field">
                <label class="label">TMDb ID</label>
                <div class="control">
                    <input class="input" type="text" name="tmdbId" value="{video.tmdbId ?: ''}" placeholder="e.g. 550">
                </div>
                <p class="help has-text-grey">The TMDb ID for metadata enrichment</p>
            </div>
        </div>
        <div class="column series-only-field" {#if video.type != 'episode'}style="display:none"{/if}>
            <div class="field">
                <label class="label">Series IMDb ID</label>
                <div class="control">
                    <input class="input" type="text" name="showImdbId" value="{video.showImdbId ?: ''}" placeholder="e.g. tt0096697">
                </div>
                <p class="help has-text-grey">The IMDb ID of the TV series</p>
            </div>
        </div>
    </div>

    <!-- Intro / Outro Timestamps (collapsible) -->
    <div class="mt-4" style="border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden;">
        <div class="p-3" style="background: rgba(255,255,255,0.03); cursor: pointer;" 
             onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
            <span class="has-text-grey-light"><i class="pi pi-clock mr-2"></i>Intro / Outro Timestamps</span>
            <span class="tag is-small is-dark is-pulled-right">Click to expand</span>
        </div>
        <div style="display: none; padding: 12px;">
            <div class="columns is-multiline">
                <div class="column is-6">
                    <div class="field">
                        <label class="label is-small">Intro Start (sec)</label>
                        <div class="control">
                            <input class="input" type="number" step="0.1" name="introStart" value="{video.introStart ?: ''}" placeholder="e.g. 85.5">
                        </div>
                    </div>
                </div>
                <div class="column is-6">
                    <div class="field">
                        <label class="label is-small">Intro End (sec)</label>
                        <div class="control">
                            <input class="input" type="number" step="0.1" name="introEnd" value="{video.introEnd ?: ''}" placeholder="e.g. 135.0">
                        </div>
                    </div>
                </div>
                <div class="column is-6">
                    <div class="field">
                        <label class="label is-small">Outro Start (sec)</label>
                        <div class="control">
                            <input class="input" type="number" step="0.1" name="outroStart" value="{video.outroStart ?: ''}" placeholder="e.g. 2100.0">
                        </div>
                    </div>
                </div>
                <div class="column is-6">
                    <div class="field">
                        <label class="label is-small">Outro End (sec)</label>
                        <div class="control">
                            <input class="input" type="number" step="0.1" name="outroEnd" value="{video.outroEnd ?: ''}" placeholder="e.g. 2220.0">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="field mt-5">
        <div class="control is-flex" style="gap: 8px;">
            <button class="button is-info is-flex-grow-1" type="submit">
                <i class="pi pi-save mr-2"></i> Save Changes
            </button>
            <button class="button is-warning" type="button" onclick="reEnrichFromEdit({video.id})" title="Re-enrich from metadata APIs">
                <i class="pi pi-refresh mr-1"></i> Re-enrich
            </button>
        </div>
    </div>
</form>

<script>
    // Toggle series fields based on type selection
    document.getElementById('typeSelector').addEventListener('change', function(e) {
        const isEpisode = e.target.value === 'episode';
        const fields = document.querySelectorAll('.series-only-field');
        fields.forEach(f => f.style.display = isEpisode ? 'block' : 'none');
    });

    // Optional: Add some visual feedback for the combobox
    var seriesInput = document.getElementById('seriesTitleInput');
    seriesInput.addEventListener('focus', function() {
        // This helps users know it's a searchable list
        if (this.value === '') {
            // Placeholder logic or show all could go here if using a custom library
        }
    });

    async function reEnrichFromEdit(videoId) {
        const btn = event.target.closest('button') || event.target;
        btn.classList.add('is-loading');
        btn.disabled = true;
        try {
            const resp = await fetch('/api/video/manage/re-enrich/' + videoId, { method: 'POST' });
            if (!resp.ok) {
                const err = await resp.text();
                window.Toast.error('Re-enrichment failed: ' + err);
                return;
            }
            window.Toast.success('Re-enrichment completed! Refreshing...');
            setTimeout(() => {
                htmx.ajax('GET', '/api/video/manage/edit/' + videoId, {
                    target: '#editVideoModalBody',
                    swap: 'innerHTML'
                });
            }, 1500);
        } catch (e) {
            window.Toast.error('Error: ' + e.message);
        } finally {
            btn.classList.remove('is-loading');
            btn.disabled = false;
        }
    }
</script>
