# Datasource
quarkus.datasource.db-kind=h2 
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.jmedia/jmedia;DB_CLOSE_DELAY=-1 
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.log.category."org.h2".level=WARN

# For HTTP - Running behind reverse proxy
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
quarkus.http.idle-timeout=30m
quarkus.http.enable-compression=false

# Allow HTTP (TLS may be terminated by reverse proxy)
quarkus.http.insecure-requests=enabled

# Reverse Proxy Configuration - IMPORTANT for WebSocket and URL generation
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-x-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

# CORS Configuration
quarkus.http.cors.origins=http://localhost:8080,http://127.0.0.1:8080,http://192.168.100.99:8080,https://music.playdeca.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
   
# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Transaction Management
quarkus.transaction-manager.default-transaction-timeout=300

# Native image configuration
quarkus.native.additional-build-args=\
    --initialize-at-run-time=org.h2.server.TcpServer,\
    --initialize-at-run-time=org.h2.server.web.WebServer,\
    --install-exit-handlers

# Include all charsets (required for audio metadata libraries like jaudiotagger)
quarkus.native.add-all-charsets=true

# Authentication and Session Configuration
quarkus.http.auth.form.enabled=true 
quarkus.http.auth.form.cookie-name=JMEDIA_SESSION
quarkus.http.auth.form.login-page=/login.html
 
# Resource inclusion for native executable
# Note: META-INF/resources/ is auto-included by Quarkus
quarkus.native.resources.includes=WEB-INF/pages/*.html,**/*.html,scripts/**

# Sync schedule (cron expression)
sync.schedule=0 0 3 * * ?

# Metadata enrichment worker (fills missing imdbId, tmdbId, showImdbId, intro/outro/recap)
metadata.enrichment.interval=60s
metadata.enrichment.batch.size=3
metadata.enrichment.retry.cooldown.minutes=30

# Enable AWT for folder picker
java.awt.headless=false

